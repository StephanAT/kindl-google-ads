<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  margin: 0; padding: 0;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  width: 1200px; height: 1200px;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
}
.container {
  width: 1200px; height: 1200px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 0 100px;
  text-align: center;
  position: relative;
  background: linear-gradient(135deg, #FFF9F0 0%, #FFF5E6 100%);
}
.headline {
  font-size: 64px;
  font-weight: 800;
  color: #2C1810;
  line-height: 1.15;
  letter-spacing: -0.02em;
}
.sub {
  font-size: 38px;
  font-weight: 600;
  color: #5C4033;
  line-height: 1.3;
  margin-top: 24px;
}
.h { color: #8B5E3C; }
.cta {
  margin-top: 44px;
  padding: 18px 48px;
  background: #8B5E3C;
  color: #fff;
  font-size: 24px;
  font-weight: 700;
  border-radius: 6px;
  letter-spacing: 0.02em;
}
.accent {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 80px; height: 3px;
  background: #8B5E3C;
  border-radius: 2px;
}
.brand {
  position: absolute;
  bottom: 36px;
  font-size: 18px;
  font-weight: 700;
  color: #8B5E3C;
  letter-spacing: 0.04em;
}
.stars {
  font-size: 16px;
  color: #B8860B;
  margin-top: 10px;
  font-weight: 600;
}
</style>
</head>
<body>
<div class="container">
  <div class="headline">Dein Dachstuhl vom Meister.</div>
  <div class="sub">Individuell geplant. <span class="h">Millimetergenau gebaut.</span></div>
  <div class="cta">Angebot anfordern</div>
  <div class="stars">★★★★★ 4,9 bei 42 Bewertungen</div>
  <div class="brand">KINDLHOLZ.AT</div>
  <div class="accent"></div>
</div>
</body>
</html>
